services:
  log-parser-postgres:
    image: postgres:18.1-bookworm
    container_name: log-parser-env-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    restart: always

  log-parser-postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: log-parser-postgres-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:log-parser-postgres:5432
    ports:
      - "127.0.0.1:5432:5432"
  
  app:
    build: .
    container_name: log-parser-app
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      - HTTP_ADDR=:${PORT:-8080}
      - HTTP_SHUTDOWN_TIMEOUT=30s
      - POSTGRES_HOST=log-parser-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_TIMEOUT=${POSTGRES_TIMEOUT}
      - LOGGER_LEVEL=${LOGGER_LEVEL}
      - LOGGER_FOLDER=/app/out/logs
    volumes:
      - ./data:/app/data
    depends_on:
      - log-parser-postgres
    restart: always